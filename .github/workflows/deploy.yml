name: Build & Deploy

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  # ── GitHub Pages ────────────────────────────────────────────────────────────
  deploy-pages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build web (GitHub Pages)
        run: flutter build web --release --no-tree-shake-icons --base-href "/fliq/" --dart-define=WEB3FORMS_KEY=${{ secrets.WEB3FORMS_KEY }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: build/web

  # ── Turhost FTP ─────────────────────────────────────────────────────────────
  deploy-ftp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build web (Turhost)
        run: flutter build web --release --no-tree-shake-icons --base-href "/" --dart-define=WEB3FORMS_KEY=${{ secrets.WEB3FORMS_KEY }}

      - name: Deploy to Turhost via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftps
          local-dir: build/web/
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          exclude: |
            **/.git*
            **/.git*/**
