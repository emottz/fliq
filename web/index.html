<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta name="google-signin-client_id" content="560944576659-07uh0u45a5rgnaed27c9v00rnvn3vioj.apps.googleusercontent.com">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Avialish">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Avialish</title>
  <link rel="manifest" href="manifest.json">

  <!--
    AdSense H5 Games Rewarded Ads
    Publisher ID'ni buraya gir: ca-pub-XXXXXXXXXXXXXXXXX
    Gerçek ID'yi AdSense hesabından alıp aşağıdaki PLACEHOLDER'ı değiştir.
    https://support.google.com/adsense/answer/12026638
  -->
  <script async
    src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-PLACEHOLDER"
    crossorigin="anonymous"></script>

  <script>
    // AdSense preload ayarı — Flutter başlatmadan önce çağrılır
    window.fliqAdConfig = function () {
      if (typeof adConfig !== 'undefined') {
        adConfig({ preloadAdBreaks: 'on', sound: 'off' });
      }
    };

    // Rewarded ad göster; izlenirse onViewed, her durumda onComplete çağrılır
    window.fliqShowRewardedAd = function (onViewed, onComplete) {
      if (typeof adBreak === 'undefined') {
        if (onComplete) onComplete();
        return;
      }
      adBreak({
        type: 'reward',
        name: 'fliq-hearts-reward',
        beforeReward: function (showAdFn) { showAdFn(); },
        adViewed: function () { if (onViewed) onViewed(); },
        adDismissed: function () {},
        afterAd: function () { if (onComplete) onComplete(); },
      });
    };
  </script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
