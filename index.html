  <!-- AdSense doğrulama meta etiketi -->

  <!-- AdSense H5 Games Rewarded Ads -->
  <script async
    src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9642294694187492"
    crossorigin="anonymous"></script>

  <script>
    // AdSense preload ayarı — Flutter başlatmadan önce çağrılır
    window.fliqAdConfig = function () {
      if (typeof adConfig !== 'undefined') {
        adConfig({ preloadAdBreaks: 'on', sound: 'off' });
      }
    };

    // Rewarded ad göster; izlenirse onViewed, her durumda onComplete çağrılır
    window.fliqShowRewardedAd = function (onViewed, onComplete) {
      if (typeof adBreak === 'undefined') {
        if (onComplete) onComplete();
        return;
      }
      adBreak({
        type: 'reward',
        name: 'fliq-hearts-reward',
        beforeReward: function (showAdFn) { showAdFn(); },
        adViewed: function () { if (onViewed) onViewed(); },
        adDismissed: function () {},
        afterAd: function () { if (onComplete) onComplete(); },
      });
    };
  </script>
</head>
<body>
  <script>
    // Service worker otomatik güncelleme:
    // Yeni versiyon deploy edilince SW aktifleşir.
    // Reload yalnızca Flutter henüz başlamadıysa yapılır;
    // kullanıcı aktif kullanımdaysa reload yapılmaz — oturum kesilmez.
    if ('serviceWorker' in navigator) {
      window._swReloadSafe = true;

      // Flutter ilk frame'ini render edince reload artık güvenli değil
      window.addEventListener('flutter-first-frame', function () {
        window._swReloadSafe = false;
      });

      navigator.serviceWorker.addEventListener('controllerchange', function () {
        if (window._swReloadSafe) {
          window.location.reload();
        }
        // Flutter aktifken reload yok — yeni SW bir sonraki ziyarette devreye girer
      });

      navigator.serviceWorker.ready.then(function (reg) {
        reg.update();
        reg.addEventListener('updatefound', function () {
          var newWorker = reg.installing;
          if (!newWorker) return;
          newWorker.addEventListener('statechange', function () {
            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
              newWorker.postMessage({ type: 'SKIP_WAITING' });
            }
          });
        });
      });
    }
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
