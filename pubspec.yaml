name: fliq
description: Avialish — Aviation English Exam & Learning App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^14.2.7
  shared_preferences: ^2.3.2
  equatable: ^2.0.5
  intl: ^0.19.0
  http: ^1.2.1
  supabase_flutter: ^2.8.4
  google_sign_in: ^6.2.1
  url_launcher: ^6.3.0
  google_mobile_ads: ^7.0.0
  in_app_purchase: ^3.2.0
  in_app_purchase_android: ^0.3.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.12
  riverpod_generator: ^2.4.3
  custom_lint: ^0.7.6
  riverpod_lint: ^2.6.4

flutter:
  uses-material-design: true

  assets:
    - assets/questions/
    - assets/questions/raw/
    - assets/images/
